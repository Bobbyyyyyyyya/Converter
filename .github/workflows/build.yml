name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CI: false
  ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
  USE_HARD_LINKS: false
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            target: mac-arm64
          - os: windows-latest
            arch: x64
            target: win-x64
          - os: ubuntu-latest
            arch: x64
            target: linux-x64

    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgdk-pixbuf2.0-dev libgtk-3-dev \
            libnotify-dev libnss3 libxss1 libxtst6 xvfb \
            libcairo2-dev libpango1.0-dev librsvg2-dev \
            libgif-dev libavif-dev

      - name: Install dependencies
        run: npm install

      - name: Build & publish (${{ matrix.target }})
        run: >
          npx electron-builder
          --${{ contains(matrix.target, 'mac') && 'mac' || contains(matrix.target, 'win') && 'win' || 'linux' }}
          --publish always
          --config.extraMetadata.main=main.js
