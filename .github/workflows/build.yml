name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CI: false
  ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
  USE_HARD_LINKS: false
  CSC_IDENTITY_AUTO_DISCOVERY: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            target: mac-arm64
          - os: windows-latest
            arch: x64
            target: win-x64
          - os: ubuntu-latest
            arch: x64
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgdk-pixbuf2.0-dev libgtk-3-dev \
            libnotify-dev libnss3 libxss1 libxtst6 xvfb \
            libcairo2-dev libpango1.0-dev librsvg2-dev \
            libgif-dev libavif-dev

      - name: Install dependencies
        run: npm install

      - name: Check node version
        run: node -e "console.log('node:', process.version)"
      - name: Check sharp version
        run: npx sharp --version || true

      - name: Build (${{ matrix.target }})
        run: >
          npx electron-builder
          --${{ contains(matrix.target, 'mac') && 'mac' || contains(matrix.target, 'win') && 'win' || 'linux' }}
          --publish never
          --config.extraMetadata.main=main.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: converter-${{ matrix.target }}
          path: dist/*
          if-no-files-found: warn

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: converter-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.zip
            *.exe
            *.AppImage
            *.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
