name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            target: mac-arm64
          - os: macos-latest
            arch: x64
            target: mac-x64
          - os: windows-latest
            arch: x64
            target: win-x64
          - os: ubuntu-latest
            arch: x64
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.target }})
        run: npx electron-builder --${{ contains(matrix.target, 'mac') && 'mac' || contains(matrix.target, 'win') && 'win' || 'linux' }} --publish never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - uses: actions/upload-artifact@v4
        with:
          name: converter-${{ matrix.target }}
          path: dist/*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: converter-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.zip
            *.exe
            *.AppImage
            *.deb
          generate_release_notes: true
