<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Player</title>
  <link rel="stylesheet" href="player.css" />
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="2"/>
          <path d="M8 7v8l6-4-6-4z" fill="currentColor"/>
        </svg>
        <span>Media Player</span>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Browse</div>
        <button class="sidebar-item active" id="sidebarHome">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 14V6l6-5 6 5v8H2z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Home
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Library</div>
        <button class="sidebar-item" id="sidebarRecent">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Recent
        </button>
        <button class="sidebar-item" id="sidebarMusic">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 13V3.5l8-1.5v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="4" cy="13" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Music
        </button>
        <button class="sidebar-item" id="sidebarVideo">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M11 8l-5-3v6l5-3z" fill="currentColor"/></svg>
          Videos
        </button>
      </div>
      <div class="sidebar-section sidebar-section-grow">
        <div class="sidebar-label">Folders</div>
        <div class="sidebar-dir-list" id="sidebarDirList"></div>
      </div>
      <div class="sidebar-footer">
        <button class="sidebar-item" id="sidebarOpenFile">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h5l2 2h5v7H2V4z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Open File...
        </button>
      </div>
    </div>

    <div class="main-content">
      <!-- Breadcrumb -->
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item" data-path="">Home</span>
      </div>

      <!-- File listing -->
      <div class="file-browser" id="fileBrowser">
        <div class="file-list-header">
          <span class="file-list-name">Name</span>
          <span class="file-list-size">Size</span>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <!-- Recent view -->
      <div class="file-browser" id="recentView" style="display:none">
        <div class="recent-header">
          <h2>Recent Files</h2>
          <button id="clearRecentBtn" class="btn-text">Clear</button>
        </div>
        <div class="recent-grid" id="recentGrid"></div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-state-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="18" stroke="currentColor" stroke-width="2" opacity="0.3"/>
            <path d="M20 17v14l12-7-12-7z" fill="currentColor" opacity="0.3"/>
          </svg>
        </div>
        <p>No files found</p>
      </div>

      <!-- Loading -->
      <div class="loading" id="loading" style="display:none">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Player controls (sticky bottom) -->
    <div class="player-controls" id="playerControls" style="display:none">
      <div class="player-video-wrap" id="playerVideoWrap">
        <video id="playerVideo" playsinline></video>
        <div class="player-audio-art" id="playerAudioArt">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="28" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
            <path d="M24 22v20a6 6 0 0012 0V22a6 6 0 00-12 0z" stroke="#6366f1" stroke-width="2.5" fill="none"/>
            <path d="M24 26c0-4 2-6 8-6s8 2 8 6" stroke="#6366f1" stroke-width="2" opacity="0.5" fill="none"/>
            <path d="M24 30c0-3 2-4 8-4s8 1 8 4" stroke="#6366f1" stroke-width="2" opacity="0.3" fill="none"/>
          </svg>
        </div>
      </div>
      <div class="player-info-bar">
        <div class="player-filename" id="playerFilename">No file loaded</div>
        <div class="player-details" id="playerDetails"></div>
      </div>
      <div class="player-progress">
        <div class="player-progress-bg" id="playerProgressBg">
          <div class="player-progress-loaded" id="playerProgressLoaded"></div>
          <div class="player-progress-fill" id="playerProgressFill"></div>
          <div class="player-progress-thumb" id="playerProgressThumb"></div>
        </div>
      </div>
      <div class="player-buttons">
        <div class="player-left">
          <button id="playerPlayBtn" class="pbtn" title="Play (Space)">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 4v12l10-6L7 4z" fill="currentColor"/></svg>
          </button>
          <button id="playerPrevBtn" class="pbtn" title="Previous">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M14 3v12L5 9l9-6z" fill="currentColor"/></svg>
          </button>
          <button id="playerNextBtn" class="pbtn" title="Next">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 3v12l9-6-9-6z" fill="currentColor"/></svg>
          </button>
          <span class="player-time" id="playerTime">0:00 / 0:00</span>
        </div>
        <div class="player-right">
          <button id="playerLoopBtn" class="pbtn" title="Loop">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 6h10l-2-2m2 8H4l2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
          </button>
          <button id="playerVolumeBtn" class="pbtn" title="Volume">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M8 7H5v6h3l4 4V3L8 7z" fill="currentColor"/><path d="M14 8a3 3 0 010 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="player-volume-slider" id="playerVolumeSlider">
            <input type="range" id="playerVolumeRange" min="0" max="1" step="0.05" value="1" />
          </div>
          <button id="playerPiPBtn" class="pbtn" title="Picture in Picture">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="2" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="8" width="7" height="6" rx="1" fill="currentColor" opacity="0.6"/></svg>
          </button>
          <button id="playerFullscreenBtn" class="pbtn" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 8V4h4M15 10v4h-4M3 10v4h4M15 8V4h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <button id="playerCloseBtn" class="pbtn pbtn-close" title="Close">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="player.js"></script>
</body>
</html>
